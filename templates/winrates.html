<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8"> <!-- 文字エンコーディング指定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- レスポンシブ対応 -->
    <title>SF6 Records</title> <!-- ページタイトル -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png"> <!-- iOSアイコン -->
    <link rel="icon" href="/static/favicon.ico"> <!-- favicon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.css" /> <!-- Bootstrap CSS読み込み -->
</head>

<body class="vh-100 d-flex flex-column">
    <main id="main" class="container my-3 flex-fill">
        <!-- タイトル -->
        <h1 style="text-align:center; font-size:clamp(24px, 6vw, 40px); font-weight:bold; margin:20px;">
            <a href="/" class="text-decoration-none text-dark">
                SF6 Records
            </a>
        </h1>

        <!-- プレイヤーリンク表示 -->
        <h1 class="text-center mb-4">
            <a id="player_link" target="_blank"></a>
        </h1>

        <!-- Act選択 -->
        <div class="col-md-3 mb-3 mx-auto">
            <div class="form-floating">
                <select class="form-select" name="act_select" id="act_select">
                    <!-- 動的に追加される -->
                </select>
                <label for="home_character_id">Act</label>
            </div>
        </div>


        <turbo-frame data-turbo-action="advance">
            <nav class="py-3">
                <ul class="nav nav-fill nav-underline">
                    <li class="nav-item"><a class="nav-link active"
                            href="/{player_id}/{act}/battle_logs">対戦</a>
                    </li>
                    <li class="nav-item"><a class="nav-link"
                            href="/{player_id}/{act}/winrates">キャラ別統計</a>
                    </li>
                    <li class="nav-item"><a class="nav-link"
                            href="/{player_id}/{act}/ranked_history">ランク統計</a>
                    </li>
                    <li class="nav-item"><a class="nav-link"
                            href="/{player_id}/{act}/battle_stats">戦績</a>
                </ul>
            </nav>

            <div id="overlay" class="overlay hidden"></div>
            <div id="battleModal" class="modal hidden">
                <style>
                    .overlay {
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;

                        background: rgba(0, 0, 0, 0.5);
                        /* 半透明の黒 */
                        z-index: 999;
                        /* モーダルより下 */
                    }

                    .modal {
                        position: fixed;
                        left: 50%;
                        top: 50%;
                        transform: translate(-50%, -50%);

                        width: 100%;
                        /* スマホではほぼ全幅 */
                        max-width: 1200px;
                        /* PCでは広がりすぎない */
                        height: auto;
                        /* 中身に合わせる */

                        background-color: rgb(255, 255, 255);

                        display: flex;
                        justify-content: center;
                        align-items: center;

                        border-radius: 10px;
                        /* 見た目向上 */
                        z-index: 1000;
                    }

                    .hidden {
                        display: none;
                    }
                </style>
                <div class="modal-content">
                    <div id="battleDetail"></div> <!-- ← これだけ残す -->
                    <button onclick="closeModal()">&times;</button>
                </div>
            </div>
            <nav class="pagy-bootstrap series-nav" aria-label="Pages">
                <ul class="pagination" id="pagination"></ul>
            </nav>

            <script>

                async function load() {
                    console.log("load start");
                    const playerId = "{player_id}"; // プレイヤーID
                    const Act = "{act}"; // Act
                    const currentAct = Act;

                    // URLから現在のパラメータ取得
                    const urlParams = new URLSearchParams(window.location.search);

                    history.pushState(null, "", "?" + params.toString());

                    const select = document.getElementById("act_select");

                    const acts = data.acts; // Actリスト

                    acts.forEach(act => {
                        const option = document.createElement("option");
                        option.value = act;
                        option.textContent = act;

                        if (String(act) === String(currentAct)) {
                            option.selected = true;
                        }

                        select.appendChild(option);
                    });

                    select.addEventListener("change", () => {
                        const selectedAct = select.value; // ←これを使う！

                        const params = new URLSearchParams(window.location.search);

                        window.location.href = `/${playerId}/${selectedAct}/battle_logs?` + params.toString();
                    });

                    // プレイヤー名表示
                    const link = document.getElementById("player_link");
                    link.innerText = data.player_name + " (" + playerId + ")";
                    link.href = `https://www.streetfighter.com/6/buckler/ja-jp/profile/${playerId}`;
                }

                load(); // 初回実行

            </script>

        </turbo-frame>
    </main>

</body>

</html>
