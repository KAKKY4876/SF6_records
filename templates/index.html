<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SF6 Records</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" href="/static/favicon.ico">

    <script async src="https://ga.jspm.io/npm:es-module-shims@2.6.2/dist/es-module-shims.js"></script>
    <link rel="stylesheet" href="/assets/application-8776d86d.css" data-turbo-track="reload" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" />
</head>

<body style="background-color:#ffffff;">

    <h1 style="text-align:center; font-size:clamp(24px, 6vw, 40px); font-weight:bold; margin:20px;">
        SF6 Records
    </h1>

    <div class="container text-center mt-4">

        <input id="player_id" type="text" class="form-control mx-auto" style="max-width:400px;" placeholder="Player ID"
            onkeydown="enterSearch(event)">

        <button class="btn btn-primary mt-2" onclick="search()">検索</button>

    </div>

    <script>

        function search() {

            const id = document.getElementById("player_id").value;

            if (id === "") return;

            window.location.href = "/" + id + "/battle_logs";

        }

        function enterSearch(e) {

            if (e.key === "Enter") {
                search();
            }

        }

    </script>

</body>

</html>
