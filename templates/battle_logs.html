<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SF6 Records</title>
    <link rel="icon" href="/static/favicon.ico">
</head>

<body>

    <h1 id="player_name"></h1>

    <table border="1" id="table">

        <thead>
            <tr>
                <th>Replay ID</th>
                <th>Date</th>
                <th>Match</th>
                <th>P1</th>
                <th>P1 Type</th>
                <th>P1 Character</th>
                <th>P2</th>
                <th>P2 Type</th>
                <th>P2 Character</th>
                <th>Result</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

    <script>

        async function load() {

            const playerId = "{player_id}";

            const res = await fetch(`/battle_logs/${playerId}`);

            const data = await res.json();

            const tbody = document.querySelector("#table tbody");

            tbody.innerHTML = "";

            document.getElementById("player_name").innerText =
                data.player_name + " (" + playerId + ")";

            data.battle_logs.forEach(row => {

                const tr = document.createElement("tr");

                const replayId = row.replay_id;
                const datetime = row.date;
                const match = row.match;
                const p1_name = row.p1_name;
                const p1_type = row.p1_type;
                const p1_character = row.p1_character;
                const p2_name = row.p2_name;
                const p2_type = row.p2_type;
                const p2_character = row.p2_character;
                const result = row.win_or_lose ? "Win" : "Lose";

                tr.innerHTML =
                    `
        <td>${replayId}</td>
        <td>${datetime}</td>
        <td>${match}</td>
        <td>${p1_name}</td>
        <td>${p1_type}</td>
        <td>${p1_character}</td>
        <td>${p2_name}</td>
        <td>${p2_type}</td>
        <td>${p2_character}</td>
        <td>${result}</td>
        `;

                tbody.appendChild(tr);

            });

        }
        
        load()

    </script>

</body>

</html>
