name: Run Python Script

on:
  schedule:
    - cron: "0 0 * * *"   # 1日1回
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt

      - name: Python1
        run: |
          python GetBattleStats.py      
      
      - name: Python2
        run: |
          python GetActData.py