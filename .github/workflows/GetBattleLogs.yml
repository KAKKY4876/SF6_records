name: Run Python Script

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install

      - name: Python実行
        run: |
          python GetBattleLogs.py