name: Run Python Script

on:
  schedule:
    - cron: "0 0 * * *"   # 1日1回
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: ライブラリインストール
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install

      - name: Python実行
        run: |
          python get_act_data.py
          python get_battle_stats.py

      - name: DBをコミット＆push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add players/ act.db players.db
          git commit -m "update battle stats" || echo "no changes"
          git push